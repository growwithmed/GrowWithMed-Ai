<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="language" content="en" />
    <meta http-equiv="content-language" content="en" />
    
    <!-- SEO tags managed by React Helmet -->
    <title>Grow With Med</title>

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Grow With Med",
      "url": "https://www.growwithmed.site",
      "description": "Discover the best AI tools, marketing platforms & digital services. Compare trusted tools used by creators, marketers, and solopreneurs to grow faster online",
      "publisher": {
        "@type": "Organization",
        "name": "Grow With Med, Team",
        "logo": {
          "@type": "ImageObject",
          "url": "https://i.ibb.co/zhS2txZW/Design-sans-titre-5.png"
        }
      },
      "keywords": "AI tools for creators, AI marketing tools for solopreneurs, best AI tools for affiliate marketing, AI tools directory for creators"
    }
    </script>
    <link rel="icon" type="image/png" href="https://i.ibb.co/zhS2txZW/Design-sans-titre-5.png" />
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-H6HJ4CF6NS"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-H6HJ4CF6NS');
    </script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
